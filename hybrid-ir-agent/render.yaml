services:
  - type: web
    name: hybrid-ir-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/hybrid_ir.db
      - key: FLASK_ENV
        value: production
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
